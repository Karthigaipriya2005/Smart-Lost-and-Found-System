{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Find Person</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body {
      background: url("{% static 'users/images/bg2.jpg' %}") center/cover no-repeat fixed;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      padding: 30px;
    }

    .btn-back-top {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #00bcd4;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
    }

    .btn-back-top:hover {
      background: #0191a8;
      cursor: pointer;
    }

    .container-box {
      background: rgba(0, 0, 0, 0.7);
      border-radius: 15px;
      padding: 25px;
      max-width: 900px;
      margin: 80px auto 30px;
      text-align: center;
      position: relative;
    }

    h2 {
      color: #00d9ff;
      margin-bottom: 30px;
    }

    .upload-section {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 20px;
    }

    .upload-box {
      background: rgba(255,255,255,0.1);
      border: 2px dashed #00d9ff;
      border-radius: 12px;
      width: 250px;
      height: 250px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background 0.3s ease;
      position: relative;
      font-weight: 600;
      text-align: center;
    }

    .upload-box:hover {
      background: rgba(255,255,255,0.2);
    }

    .upload-box input {
      display: none;
    }

    .upload-box i {
      font-size: 40px;
      margin-bottom: 10px;
      color: #00d9ff;
    }

    .btn-search {
      background: #00bcd4;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-weight: 600;
      margin: 20px 0;
    }

    .btn-search:hover {
      background: #0191a8;
    }

    .result-item {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 2px solid #00d9ff;
      border-radius: 10px;
      margin: 10px;
      padding: 10px;
      text-align: center;
      width: 250px;
    }

    .result-item img {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 5px;
      border: 1px solid #00d9ff;
    }

    .timestamp {
      font-size: 0.9rem;
      color: #fff;
      font-weight: 500;
    }

    .no-match {
      color: #ff5555;
      font-weight: bold;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <button class="btn-back-top" onclick="window.location.href='{% url 'users:user_dashboard' %}'">
    <i class="bi bi-arrow-left-circle"></i> Back
  </button>

  <div class="container-box">
    <h2>Find Person</h2>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="upload-section">
        <!-- Video Upload -->
        <label class="upload-box" id="video-label">
          <i class="bi bi-camera-video"></i>
          <span id="video-text">Upload Video</span>
          <input type="file" name="video" accept="video/*" id="video-input">
        </label>

        <!-- Image Upload -->
        <label class="upload-box" id="image-label">
          <i class="bi bi-person"></i>
          <span id="image-text">Upload Image</span>
          <input type="file" name="image" accept="image/*" id="image-input">
        </label>
      </div>

      <button type="submit" class="btn btn-search" name="search">Search</button>
    </form>

    {% if message %}
      <p style="color: rgb(139, 223, 238); font-weight: bold; text-align: center;">{{ message }}</p>
    {% endif %}

    <!-- Display Results -->
    {% if results %}
      <div class="results mt-4">
        {% for res in results %}
          <div class="result-item">
            <img src="{{ res.img }}" alt="Matched Frame">
            <div class="timestamp">Timestamp: {{ res.time }}</div>
          </div>
        {% endfor %}
        {% if results|length == 0 %}
          <p class="no-match">No matches found.</p>
        {% endif %}
      </div>
    {% endif %}
  </div>

  <script>
    const videoInput = document.getElementById('video-input');
    const videoText = document.getElementById('video-text');
    videoInput.addEventListener('change', () => {
      if(videoInput.files.length > 0){
        videoText.textContent = "Video Uploaded ";
      }
    });

    const imageInput = document.getElementById('image-input');
    const imageText = document.getElementById('image-text');
    imageInput.addEventListener('change', () => {
      if(imageInput.files.length > 0){
        imageText.textContent = "Image Uploaded ";
      }
    });
  </script>

</body>
</html>
